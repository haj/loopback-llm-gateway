name: OpenAPI Bundle

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/openapi-bundle.yml"
      - "docs/openapi/**"
      - "!docs/openapi/openapi.json"

permissions:
  contents: read

jobs:
  bundle-openapi:
    name: Bundle OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          allowed-endpoints: >
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Bundle OpenAPI spec
        working-directory: ./docs/openapi
        run: python bundle.py

      - name: Fail if openapi.json is out of date
        run: |
          if ! git diff --quiet docs/openapi/openapi.json; then
            echo "::error::docs/openapi/openapi.json is out of date."
            echo "Run 'python docs/openapi/bundle.py' locally and commit the result."
            git diff --stat docs/openapi/openapi.json
            exit 1
          fi
          echo "openapi.json is up to date"
