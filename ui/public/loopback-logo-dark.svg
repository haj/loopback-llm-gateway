<svg width="190" height="34" viewBox="0 0 190 34" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Loopback Gateway">
  <!-- loopback mark: an arrow that loops back on itself -->
  <g transform="translate(3 3)">
    <circle cx="14" cy="14" r="13" stroke="#2DD4BF" stroke-width="2.5" fill="none" stroke-dasharray="58 14" stroke-linecap="round" transform="rotate(35 14 14)"/>
    <path d="M14 3.5 L20 0 L20 7 Z" fill="#2DD4BF" transform="rotate(35 14 14)"/>
    <circle cx="14" cy="14" r="3.4" fill="#2DD4BF"/>
  </g>
  <!-- wordmark (light text for dark backgrounds) -->
  <text x="40" y="22" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="17" font-weight="700" letter-spacing="-0.3" fill="#FAFAFA">Loopback</text>
</svg>
